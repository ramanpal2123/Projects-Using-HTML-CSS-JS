    <title>Image Generator</title>
</head>

<body>

    <div class="container text-center py-5">

        <h2 class="title mb-4">Image Generator 🎨</h2>

        <div id="controls" class="d-flex justify-content-center gap-3 flex-wrap">
            <input type="url" id="url" placeholder="Enter image URL">
            <input type="text" id="name" placeholder="Enter image name">
            <button onclick="generate()">Generate</button>
        </div>

        <p class="suggest mt-3">
            Try: https://picsum.photos/300/200
        </p>
        

    </div>

    <!-- Image container -->
    <div id="main" class="image-grid"></div>
